services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./models:/app/models:ro

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
    environment:
      # Server-side proxy from Next to API service (browser uses same-origin /api/py)
      - BACKEND_URL=http://api:8000
      - NEXT_PUBLIC_USE_PROXY=1
    depends_on:
      - api
