# Lint + build + Python unit tests (ML smoke tests skip if models/ absent).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  web:
    name: Web lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install (monorepo root)
        run: npm ci
        working-directory: .
      - name: ESLint
        run: npm run lint
      - name: Next.js build
        run: npm run build

  api-tests:
    name: API unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Unit tests
        env:
          PYTHONPATH: .
        run: python -m unittest discover -s api/tests -p "test_*.py" -v
